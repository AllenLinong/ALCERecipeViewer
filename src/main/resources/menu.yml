# ============================================================
# AL-RecipeViewer 菜单配置文件 (Shape 布局)
# # = 背景, A-Z = 按钮, I = 动态物品区
# ============================================================

main_menu:
  title: "&8ALCE合成表 - 分类浏览"
  shape:
    - "#########"
    - "#A#B#C#D#"
    - "#########"
    - "#E#F#G#H#"
    - "#########"
    - "#########"
  buttons:
    A:
      material: "CRAFTING_TABLE"
      name: "&6&l工作台配方"
      lore:
        - "&7有序合成 / 无序合成"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "crafting"
    B:
      material: "FURNACE"
      name: "&6&l熔炉烧炼"
      lore:
        - "&7使用熔炉烧炼物品"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "smelting"
    C:
      material: "BLAST_FURNACE"
      name: "&6&l高炉烧炼"
      lore:
        - "&7使用高炉快速烧炼"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "blasting"
    D:
      material: "SMOKER"
      name: "&6&l烟熏炉"
      lore:
        - "&7使用烟熏炉烹饪食物"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "smoking"
    E:
      material: "CAMPFIRE"
      name: "&6&l营火烹饪"
      lore:
        - "&7使用营火烹饪食物"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "campfire_cooking"
    F:
      material: "STONECUTTER"
      name: "&6&l切石机"
      lore:
        - "&7使用切石机加工石料"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "stonecutting"
    G:
      material: "SMITHING_TABLE"
      name: "&6&l锻造台"
      lore:
        - "&7锻造变换 / 锻造纹饰"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "smithing"
    H:
      material: "BREWING_STAND"
      name: "&6&l酿造台"
      lore:
        - "&7使用酿造台制作药水"
        - "&7共有 &f{count} &7个配方"
        - ""
        - "&e▶ 点击浏览"
      action: "OPEN_CATEGORY"
      category: "brewing"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

recipe_list:
  title: "&8{category} ({page}/{total})"
  shape:
    - "#########"
    - "#IIIIIII#"
    - "#IIIIIII#"
    - "#IIIIIII#"
    - "#IIIIIII#"
    - "P#S#B###N"
  buttons:
    I:
      dynamic: true
    P:
      material: "ARROW"
      name: "&e◀ 上一页"
      lore:
        - "&7第 {page} 页"
      action: "PREV_PAGE"
    S:
      material: "COMPASS"
      name: "&b🔍 搜索"
      lore:
        - "&7当前搜索: &f{query}"
        - "&7▶ 左键：输入名称搜索"
        - "&7▶ Shift+左键：清空搜索"
      action: "SEARCH"
    B:
      material: "OAK_DOOR"
      name: "&c◀ 返回主菜单"
      lore:
        - "&7点击返回分类浏览"
      action: "BACK_TO_MAIN"
    N:
      material: "ARROW"
      name: "&e下一页 ▶"
      lore:
        - "&7第 {page} 页"
      action: "NEXT_PAGE"
    C:
      material: "BARRIER"
      name: "&c关闭"
      action: "CLOSE"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

