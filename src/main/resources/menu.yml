# ============================================================
# AL-RecipeViewer 菜单配置文件 (Shape 布局)
# 文字使用 {@key} 引用 lang 文件中的 menu 节点
# ============================================================

main_menu:
  title: "{@main_title}"
  shape:
    - "#########"
    - "#A#B#C#D#"
    - "#########"
    - "#E#F#G#H#"
    - "#########"
    - "#########"
  buttons:
    A:
      material: "CRAFTING_TABLE"
      name: "{@category_crafting}"
      lore:
        - "{@category_crafting_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "crafting"
    B:
      material: "FURNACE"
      name: "{@category_smelting}"
      lore:
        - "{@category_smelting_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "smelting"
    C:
      material: "BLAST_FURNACE"
      name: "{@category_blasting}"
      lore:
        - "{@category_blasting_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "blasting"
    D:
      material: "SMOKER"
      name: "{@category_smoking}"
      lore:
        - "{@category_smoking_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "smoking"
    E:
      material: "CAMPFIRE"
      name: "{@category_campfire}"
      lore:
        - "{@category_campfire_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "campfire_cooking"
    F:
      material: "STONECUTTER"
      name: "{@category_stonecutting}"
      lore:
        - "{@category_stonecutting_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "stonecutting"
    G:
      material: "SMITHING_TABLE"
      name: "{@category_smithing}"
      lore:
        - "{@category_smithing_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "smithing"
    H:
      material: "BREWING_STAND"
      name: "{@category_brewing}"
      lore:
        - "{@category_brewing_desc}"
        - "{@recipe_count}"
        - ""
        - "{@click_browse}"
      action: "OPEN_CATEGORY"
      category: "brewing"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

recipe_list:
  title: "&8{category} ({page}/{total})"
  shape:
    - "#########"
    - "#IIIIIII#"
    - "#IIIIIII#"
    - "#IIIIIII#"
    - "#IIIIIII#"
    - "P#S#B###N"
  buttons:
    I:
      dynamic: true
    P:
      material: "ARROW"
      name: "{@prev_page}"
      lore:
        - "{@page_indicator}"
      action: "PREV_PAGE"
    S:
      material: "COMPASS"
      name: "{@search}"
      lore:
        - "{@search_current}"
        - "{@search_left}"
        - "{@search_shift}"
      action: "SEARCH"
    B:
      material: "OAK_DOOR"
      name: "{@back_to_main}"
      lore:
        - "{@back_to_main_desc}"
      action: "BACK_TO_MAIN"
    N:
      material: "ARROW"
      name: "{@next_page}"
      lore:
        - "{@page_indicator}"
      action: "NEXT_PAGE"
    C:
      material: "BARRIER"
      name: "{@close}"
      action: "CLOSE"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

