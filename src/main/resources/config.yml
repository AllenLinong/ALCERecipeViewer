# ============================================
# AL-RecipeViewer 主配置文件
# 界面布局见 menu.yml，显示文本见 lang.yml
# ============================================

# 插件语言（zh_cn / en_us）
language: zh_cn

# 功能开关
features:
  # 调试模式：点击配方物品时在聊天栏显示名称解析信息
  debug: false
  # 多配方轮播间隔（秒）：同一物品有多个合成配方时，详情页每隔此秒数自动切换
  multi-recipe-cycle-seconds: 10
