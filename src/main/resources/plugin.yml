name: ALCERecipeViewer
version: '${project.version}'
main: com.linong.recipelookup.ALCERecipeViewer
api-version: '1.21'
folia-supported: true
author: Allen_Linong
description: AL合成表查看器 - 按分类浏览合成配方，支持搜索与用途查看

softdepend:
  - CraftEngine

commands:
  alcerecipes:
    description: 打开AL合成表查看器，按分类浏览合成配方
    usage: /<command> [search|usage|reload] [物品ID]
    aliases:
      - alcer
      - alcebook
      - alcerecipe
    permission: alcerecipeviewer.use
    permission-message: "&c你没有权限使用此命令。"

permissions:
  alcerecipeviewer.use:
    description: 允许使用 /alcerecipes 查看合成配方
    default: true
  alcerecipeviewer.admin:
    description: 允许使用管理命令（重载数据）
    default: op
