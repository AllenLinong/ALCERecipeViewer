recipe_creator_type:
  title: "&8选择配方类型"
  size: 54
  shape:
    - "#########"
    - "#A#C#F#S#"
    - "#L#Y#T#N#"
    - "####B####"
  buttons:
    A:
      material: "CRAFTING_TABLE"
      name: "&6&l有序合成"
      lore:
        - "&73x3工作台 - 固定摆放"
      action: "CREATOR_SHAPED"
    C:
      material: "CRAFTING_TABLE"
      name: "&e&l无序合成"
      lore:
        - "&73x3工作台 - 任意摆放"
      action: "CREATOR_SHAPELESS"
    F:
      material: "FURNACE"
      name: "&c&l熔炉/高炉烧炼"
      lore:
        - "&7熔炉&高炉配方"
      action: "CREATOR_FURNACE"
    S:
      material: "SMITHING_TABLE"
      name: "&b&l锻造台"
      lore:
        - "&7锻造变换配方"
      action: "CREATOR_SMITHING"
    T:
      material: "STONECUTTER"
      name: "&7&l切石机"
      lore:
        - "&7切石机配方"
      action: "CREATOR_STONECUTTER"
    N:
      material: "BREWING_STAND"
      name: "&5&l酿造台"
      lore:
        - "&7酿造配方"
      action: "CREATOR_BREWING"
    L:
      material: "CAMPFIRE"
      name: "&6&l营火烹饪"
      lore:
        - "&7营火配方"
      action: "CREATOR_CAMPFIRE"
    Y:
      material: "SMOKER"
      name: "&8&l烟熏炉"
      lore:
        - "&7烟熏炉配方"
      action: "CREATOR_SMOKING"
    B:
      material: "OAK_DOOR"
      name: "&c返回"
      action: "BACK"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

