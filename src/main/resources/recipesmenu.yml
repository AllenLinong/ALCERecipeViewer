# ============================================================
# AL-RecipeViewer 新增配方菜单配置
# 文字使用 {@key} 引用 lang 文件中的 menu 节点
# ============================================================

recipe_creator_type:
  title: "{@creator_type_title}"
  size: 54
  shape:
    - "#########"
    - "#A#C#F#S#"
    - "#L#Y#T#N#"
    - "####B####"
  buttons:
    A:
      material: "CRAFTING_TABLE"
      name: "{@creator_shaped}"
      lore:
        - "{@creator_shaped_desc}"
      action: "CREATOR_SHAPED"
    C:
      material: "CRAFTING_TABLE"
      name: "{@creator_shapeless}"
      lore:
        - "{@creator_shapeless_desc}"
      action: "CREATOR_SHAPELESS"
    F:
      material: "FURNACE"
      name: "{@creator_furnace}"
      lore:
        - "{@creator_furnace_desc}"
      action: "CREATOR_FURNACE"
    S:
      material: "SMITHING_TABLE"
      name: "{@creator_smithing}"
      lore:
        - "{@creator_smithing_desc}"
      action: "CREATOR_SMITHING"
    T:
      material: "STONECUTTER"
      name: "{@creator_stonecutter}"
      lore:
        - "{@creator_stonecutter_desc}"
      action: "CREATOR_STONECUTTER"
    N:
      material: "BREWING_STAND"
      name: "{@creator_brewing}"
      lore:
        - "{@creator_brewing_desc}"
      action: "CREATOR_BREWING"
    L:
      material: "CAMPFIRE"
      name: "{@creator_campfire}"
      lore:
        - "{@creator_campfire_desc}"
      action: "CREATOR_CAMPFIRE"
    Y:
      material: "SMOKER"
      name: "{@creator_smoking}"
      lore:
        - "{@creator_smoking_desc}"
      action: "CREATOR_SMOKING"
    B:
      material: "OAK_DOOR"
      name: "{@creator_back}"
      action: "BACK"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

recipe_creator_shaped:
  title: "{@creator_shaped_title}"
  size: 54
  shape:
    - "#########"
    - "#III#####"
    - "#III###R#"
    - "#III#####"
    - "#########"
    - "####B####"
  buttons:
    I:
      dynamic: true
    R:
      dynamic: true
    B:
      material: "OAK_DOOR"
      name: "{@creator_save}"
      action: "SAVE_RECIPE"
    "#":
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

